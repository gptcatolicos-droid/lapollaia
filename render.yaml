services:
  - type: web
    name: lapollaia
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: lapollaia-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: MP_ACCESS_TOKEN
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: APP_URL
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_SECURE
        value: "false"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: FOOTBALL_API_KEY
        sync: false

databases:
  - name: lapollaia-db
    plan: starter
    databaseName: lapollaia
    ipAllowList: []
